<app-navbar />

<h1>Utilisateurs</h1>

<div>La recherche est : {{ search$ | async }}</div>

<p>Choisir une couleur:</p> <app-color [(ngModel)]="colorSelected" />

<form #myform="ngForm" (ngSubmit)="createUser(myform)">
    <label>Email</label>
    <input type="text" name="email" ngModel>

    <label>Name</label>
    <input type="text" name="name" ngModel>

    <button>Créer</button>
</form>

@for (u of users$ | async ; track u.id) {
    <app-user-card [user]="u" (eventDelete)="deleteUser($event)" />
}
