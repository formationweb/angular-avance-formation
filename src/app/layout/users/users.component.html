<form (ngSubmit)="createUser(myform)" #myform="ngForm">
    <h1>Créer utilisateur</h1>

    <label>Nom</label>
    <input type="text" name="name" ngModel>

    <label>Email</label>
    <input type="text" name="email" ngModel>

    <button>Créer</button>
</form>

<app-user-card *ngFor="let u of users$ | async" [user]="u" />
