<form #myform="ngForm" (ngSubmit)="createUser(myform)">
    <label>Nom</label>
    <input type="text" name="name" ngModel>

    <label>Email</label>
    <input type="text" name="email" ngModel>

    <button>Créer utilisateur</button>
</form>

<app-color [(ngModel)]="mycolor"></app-color>

{{ mycolor }}

<app-user-card 
    *ngFor="let u of users$ | async" [user]="u"
    (onDelete)="deleteUser($event)"
    >
</app-user-card>
